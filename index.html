<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy TP Form Filling</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #f43f5e;
        }

        body {
            padding: 0 20px;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 3rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom right, #ffffff 30%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-card:hover {
            background: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.6);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-card:active {
            transform: scale(0.96);
        }

        /* Footer / Credit Styling */
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            animation: fadeIn 1.2s ease-out;
            letter-spacing: 0.5px;
        }

        .heart {
            color: var(--accent);
            display: inline-block;
            animation: pulse 1.5s ease infinite;
            margin: 0 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .portfolio-link {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 2px;
        }

        .portfolio-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: var(--secondary);
            transition: width 0.3s ease;
        }

        .portfolio-link:hover {
            color: var(--secondary);
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        .portfolio-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Easy TP Filling</h1>
        <p>Streamline your RTO paperwork with our automated TP form generator. Fast, accurate, and ready to print.</p>
        
        <div class="buttons-container">
            <a href="tpForm.html">
                <div class="btn-card">
                    <span>📄</span> Open TP Form
                </div>
            </a>
            <a href="tpApply.html">
                <div class="btn-card">
                    <span>⚡</span> New TP Application
                </div>
            </a>
        </div>
    </div>

    <div class="footer">
        made with <span class="heart">❤️</span> 
        <a href="https://msalihkc.github.io/mskc_pf/" class="portfolio-link" target="_blank">mSalihKc</a>
    </div>

</body>
</html>
