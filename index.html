<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy TP Form Filling</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            padding: 0px 10px;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: translateY(0);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        a {
            text-decoration: none;
            color: white;
            perspective: 1000px;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Hover Effects */
        .btn-card:hover {
            background: var(--primary);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .btn-card:active {
            transform: translateY(0) scale(0.98);
        }

        /* Subtle Glow Animation */
        .btn-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-card:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Easy TP Filling</h1>
        <p>Streamline your RTO paperwork with our automated TP form generator. Fast, accurate, and ready to print.</p>
        
        <div class="buttons-container">
            <a href="tpForm.html">
                <div class="btn-card">📄 Open TP Form</div>
            </a>
            <a href="tpApply.html">
                <div class="btn-card">⚡ New TP Application</div>
            </a>
        </div>
    </div>
</body>
</html>
