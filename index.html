<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTO TP Form Pro - mSalihKc</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --primary: #2563eb;
        --bg: #f1f5f9;
        --accent: #ef4444;
      }
      body {
        font-family: "Montserrat", sans-serif;
        margin: 0;
        background: var(--bg);
        color: #1e293b;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        flex: 1;
      }
      .form-card {
        width: 100%;
        max-width: 900px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        margin-bottom: 40px;
        box-sizing: border-box;
      }
      .grid-inputs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
      }

      /* --- Vehicle Number & Reg Mark Multi-Input Styling --- */
      .v-num-wrapper {
        display: flex;
        align-items: center;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 2px 10px;
        background: #fff;
        width: fit-content;
        transition: border-color 0.2s;
      }

      .v-num-wrapper:focus-within {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
      }

      .v-num-wrapper input {
        border: none;
        outline: none;
        text-align: center;
        padding: 8px 0;
        font-size: 14px;
        color: #334155;
        background: transparent;
      }

      .part-1, .part-2 { width: 30px; }
      .part-3 { width: 40px; }
      .part-4 { width: 55px; }

      .v-num-sep {
        font-weight: bold;
        color: #94a3b8;
        padding: 0 4px;
      }

      label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 5px;
      }
      input {
        padding: 10px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-family: "Montserrat";
        font-size: 14px;
        outline: none;
      }
      input:focus { border-color: var(--primary); }
      .btn-row {
        margin-top: 25px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        border: none;
        padding: 15px 25px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        flex: 1;
        transition: opacity 0.2s;
      }
      .btn-save { background: #0f172a; color: white; }
      .btn-print { background: var(--primary); color: white; font-size: 16px; }
      .btn-reset { background: #cbd5e1; color: #1e293b; max-width: 120px; }

      .preview-window {
        width: 100%;
        overflow-x: auto;
        background: #94a3b8;
        padding: 20px;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        box-sizing: border-box;
      }
      .a4-page {
        width: 210mm;
        height: 297mm;
        background-color: white;
        background-image: url("TPForm_img.jpg");
        background-size: 100% 100%;
        position: relative;
        flex-shrink: 0;
        print-color-adjust: exact;
      }

      .data-point {
        position: absolute;
        color: #000;
        font-weight: 600;
        font-size: 15px;
        cursor: move;
        white-space: nowrap;
      }

      .divider-line {
        height: 2px;
        background: black;
        width: 70px;
      }

      footer {
        padding: 30px 0;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        color: #64748b;
      }
      .portfolio-link { color: var(--accent); text-decoration: none; }

      @media print {
        @page { margin: 0; }
        .form-card, .btn-row, footer { display: none !important; }
        body, .container, .preview-window { background: white; padding: 0; margin: 0; display: block; }
        .a4-page { box-shadow: none; margin: 0; border: none; }
        .is-empty { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="form-card">
        <h2 style="margin-top: 0; color: var(--primary)">RTO TP Form Entry</h2>

        <label>Fractional Vehicle Number</label>
        <div class="v-num-wrapper" id="wrapper-fraction" style="margin-bottom: 20px">
          <input type="text" class="part-1" id="in-vn1" placeholder="KL" maxlength="2" />
          <span class="v-num-sep">-</span>
          <input type="text" class="part-2" id="in-vn2" placeholder="11" maxlength="2" />
          <span class="v-num-sep">-</span>
          <input type="text" class="part-3" id="in-vn3" placeholder="XX" maxlength="2" />
          <span class="v-num-sep">-</span>
          <input type="text" class="part-4" id="in-vn4" placeholder="0000" maxlength="4" />
        </div>

        <div id="inputs" class="grid-inputs"></div>

        <div class="btn-row">
          <button class="btn btn-save" onclick="saveData()">💾 SAVE DATA & POSITIONS</button>
          <button class="btn btn-print" onclick="window.print()">🖨️ PRINT FORM</button>
          <button class="btn btn-reset" onclick="resetForm()">🔄 RESET</button>
        </div>
      </div>

      <div class="preview-window">
        <div class="a4-page" id="form-page">
          <div id="v-line1" class="data-point divider-line" style="top: 540px; left: 300px"></div>
        </div>
      </div>

      <footer>made with ❤️ <a href="https://msalihkc.github.io/mskc_pf/" class="portfolio-link" target="_blank">mSalihKc</a></footer>
    </div>

    <script>
      const d = new Date();
      const formattedDate = `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;

      const fields = [
        { id: "vn1", label: "State", default: "", top: "540px", left: "300px", type: "fraction" },
        { id: "vn2", label: "Dist", default: "", top: "540px", left: "330px", type: "fraction" },
        { id: "vn3", label: "Series", default: "", top: "560px", left: "290px", type: "fraction" },
        { id: "vn4", label: "Num", default: "", top: "560px", left: "320px", type: "fraction" },
        { id: "rto", label: "RTO Office", default: "Kozhikode", top: "183px", left: "97px" },
        { id: "name", label: "Full Name", default: "", top: "312px", left: "400px" },
        { id: "guardian", label: "Father/Husband", default: "", top: "358px", left: "400px" },
        { id: "addr1", label: "Address Line 1", default: "", top: "384px", left: "400px" },
        { id: "addr2", label: "Address Line 2", default: "", top: "410px", left: "400px" },
        { id: "addr3", label: "Address Line 3", default: "", top: "436px", left: "400px" },
        { id: "purpose", label: "Purpose", default: "For the convenience of Public", top: "481px", left: "400px" },
        { id: "goods", label: "Nature of Goods", default: "P/L Only", top: "525px", left: "400px" },
        { id: "reg", label: "Reg Mark", default: "", top: "679px", left: "425px", type: "multi" },
        { id: "route", label: "Route/Area", default: "Mavoor To Kozhikode", top: "554px", left: "400px" },
        { id: "dur", label: "Duration", default: "20 Days", top: "579px", left: "400px" },
        { id: "cap", label: "Seating Capacity", default: "38", top: "626px", left: "425px" },
        { id: "ch", label: "Chalan No", default: "", top: "743px", left: "311px" },
        { id: "amt", label: "Amount Rs", default: "610/-", top: "770px", left: "517px" },
        { id: "date", label: "Date", default: formattedDate, top: "1001px", left: "140px" },
      ];

      const inputContainer = document.getElementById("inputs");
      const pageContainer = document.getElementById("form-page");
      const savedPos = JSON.parse(localStorage.getItem("rto_positions_final")) || {};
      const savedData = JSON.parse(localStorage.getItem("rto_saved_data")) || {};

      fields.forEach((f) => {
        const currentVal = savedData[f.id] !== undefined ? savedData[f.id] : f.default;

        if (f.type === "multi") {
          // Add the Special Multi-Input Box for Reg Mark
          inputContainer.innerHTML += `
            <div class="input-group">
                <label>${f.label}</label>
                <div class="v-num-wrapper" id="wrapper-reg">
                    <input type="text" class="part-1" id="reg-p1" placeholder="KL" maxlength="2" />
                    <span class="v-num-sep">-</span>
                    <input type="text" class="part-2" id="reg-p2" placeholder="11" maxlength="2" />
                    <span class="v-num-sep">-</span>
                    <input type="text" class="part-3" id="reg-p3" placeholder="XX" maxlength="2" />
                    <span class="v-num-sep">-</span>
                    <input type="text" class="part-4" id="reg-p4" placeholder="0000" maxlength="4" />
                </div>
            </div>`;
        } else if (!f.type) {
          // Standard input fields
          inputContainer.innerHTML += `
            <div class="input-group">
                <label>${f.label}</label>
                <input type="text" id="in-${f.id}" value="${currentVal}" oninput="updateText('${f.id}', this.value)">
            </div>`;
        } else if (f.type === "fraction") {
            // Values for top fraction are already handled by manual inputs in HTML
            document.getElementById(`in-${f.id}`).value = currentVal;
        }

        const pos = savedPos[f.id] || { top: f.top, left: f.left };
        const el = document.createElement("div");
        el.id = `v-${f.id}`;
        el.className = "data-point " + (currentVal.trim() === "" ? "is-empty" : "");
        el.style.top = pos.top;
        el.style.left = pos.left;
        el.innerText = currentVal || `[${f.id}]`;

        pageContainer.appendChild(el);
        makeDraggable(el, f.id);
      });

      // Special divider line
      const lineEl = document.getElementById("v-line1");
      lineEl.style.top = savedPos["line1"]?.top || "558px";
      lineEl.style.left = savedPos["line1"]?.left || "290px";
      makeDraggable(lineEl, "line1");

      function updateText(id, val) {
        const target = document.getElementById("v-" + id);
        if (!target) return;
        if (val.trim() === "") {
          target.innerText = "[" + id + "]";
          target.classList.add("is-empty");
        } else {
          target.innerText = val;
          target.classList.remove("is-empty");
        }
      }

      function makeDraggable(el, id) {
        let isDragging = false;
        el.onmousedown = (e) => {
          isDragging = true;
          let shiftX = e.clientX - el.getBoundingClientRect().left;
          let shiftY = e.clientY - el.getBoundingClientRect().top;
          document.onmousemove = (e) => {
            if (!isDragging) return;
            let p = pageContainer.getBoundingClientRect();
            el.style.left = e.clientX - p.left - shiftX + "px";
            el.style.top = e.clientY - p.top - shiftY + "px";
          };
          document.onmouseup = () => {
            isDragging = false;
            document.onmousemove = null;
          };
        };
      }

      /* --- Logic for ALL Multi-Inputs (Top and Reg Mark) --- */
      function setupMultiInput(wrapperId, outputId, isFractional) {
        const inputs = document.querySelectorAll(`#${wrapperId} input`);
        inputs.forEach((input, index) => {
          input.addEventListener("input", () => {
            // Validation
            if (index === 0 || index === 2) input.value = input.value.toUpperCase().replace(/[^A-Z]/g, '');
            else input.value = input.value.replace(/[^0-9]/g, '');

            if (isFractional) {
                // If it's the top box, update vn1, vn2 etc individually
                updateText(input.id.replace("in-", ""), input.value);
            } else {
                // If it's the Reg Mark box, combine them
                const p1 = inputs[0].value;
                const p2 = inputs[1].value;
                const p3 = inputs[2].value;
                const p4 = inputs[3].value;
                let p2Disp = p2;
                if (p2.length === 2 && p2.startsWith("0")) p2Disp = p2.substring(1);
                const combined = `${p1} ${p2Disp} ${p3} ${p4}`.trim();
                updateText(outputId, combined);
            }

            // Auto-tab
            if (input.value.length >= input.maxLength && index < inputs.length - 1) inputs[index+1].focus();
          });

          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && input.value.length === 0 && index > 0) inputs[index-1].focus();
          });
        });
      }

      setupMultiInput("wrapper-fraction", null, true);
      setupMultiInput("wrapper-reg", "reg", false);

      function saveData() {
        const positions = {};
        const formData = {};
        fields.forEach((f) => {
          const el = document.getElementById(`v-${f.id}`);
          positions[f.id] = { top: el.style.top, left: el.style.left };
          
          if (f.type === "fraction") formData[f.id] = document.getElementById(`in-${f.id}`).value;
          else if (f.type === "multi") {
              const parts = document.querySelectorAll("#wrapper-reg input");
              formData[f.id] = Array.from(parts).map(p => p.value).join("|"); // Store joined by pipe
          }
          else formData[f.id] = document.getElementById(`in-${f.id}`).value;
        });

        localStorage.setItem("rto_positions_final", JSON.stringify(positions));
        localStorage.setItem("rto_saved_data", JSON.stringify(formData));
        alert("Saved!");
      }

      // Restore multi-part reg mark on load
      if (savedData["reg"] && savedData["reg"].includes("|")) {
          const parts = savedData["reg"].split("|");
          const regInputs = document.querySelectorAll("#wrapper-reg input");
          parts.forEach((val, i) => { if(regInputs[i]) regInputs[i].value = val; });
          // Manually trigger one update to refresh preview
          regInputs[0].dispatchEvent(new Event('input'));
      }

      function resetForm() {
        if (confirm("Reset?")) {
          localStorage.removeItem("rto_saved_data");
          location.reload();
        }
      }
    </script>
  </body>
</html>
